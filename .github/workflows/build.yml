name: Build Offline Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  dist-apk:
    name: Compile Standalone Offline Android Project
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Cordova Framework
        run: npm install -g cordova

      - name: Generate Local Android Project
        run: |
          cordova create outputapp com.mentalist.lock "Lock"
          cd outputapp
          cordova platform add android --no-telemetry

