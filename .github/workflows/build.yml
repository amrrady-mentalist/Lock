name: Build Offline Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Standalone Offline Android Project
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Initialize Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup Java Development Kit (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Cordova Framework
      run: npm install -g cordova

    - name: Generate Local Android Project
      # CHANGED: 'com.mentalist.lock' to 'com.mentalist.lockapp' to avoid reserved keyword crash
      run: |
        cordova create outputapp com.mentalist.lockapp "Lock"
        cd outputapp
        cordova platform add android
        cp -R ../index.html www/index.html
        
    - name: Generate Flat Black Lock Icon (Pure Code)
      run: |
        cd outputapp
        mkdir -p res/icon/android
        # Generates a solid pitch-black 512x512 png icon directly using native python tools
        python3 -c "
        import struct, zlib
        def make_png(w, h, color):
            buf = b''.join([b'\x00' + color * w for _ in range(h)])
            chunks = [
                b'\x89PNG\r\n\x1a\n',
                b'IHDR' + struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0),
                b'IDAT' + zlib.compress(buf),
                b'IEND'
            ]
            return b''.join([c if i==0 else struct.pack('>I', len(c)-4) + c + struct.pack('>I', zlib.crc32(c)) for i, c in enumerate(chunks)])
        with open('res/icon/android/icon.png', 'wb') as f:
            f.write(make_png(512, 512, b'\x00\x00\x00'))
        "
        # Inject custom icon preference directly into Cordova config file
        sed -i '/<\/widget>/i \    <platform name="android">\n        <icon src="res/icon/android/icon.png" \/>\n    <\/platform>' config.xml

    - name: Compile Android Release APK
      run: |
        cd outputapp
        cordova build android --release -- --packageType=apk

    - name: Sign Android Binary Asset
      run: |
        cd outputapp/platforms/android/app/build/outputs/apk/release
        # Generate a temporary keystore to sign the application securely
        keytool -genkey -v -keystore release.keystore -alias app-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass targetpassword -keypass targetpassword -dname "CN=Android,O=Magic,C=US"
        jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore release.keystore -storepass targetpassword app-release-unsigned.apk app-alias
        # Standardize the alignment array parameters
        ${ANDROID_HOME}/build-tools/34.0.0/zipalign -v 4 app-release-unsigned.apk MagicLock.apk

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Magic-Lock-Application
        path: outputapp/platforms/android/app/build/outputs/apk/release/MagicLock.apk
