name: Build Offline Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Standalone Offline Android Project
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Initialize Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup Java Development Kit (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Cordova Framework
      run: npm install -g cordova

    - name: Generate Local Android Project
      run: |
        cordova create outputapp com.mentalist.lockapp "Lock"
        cd outputapp
        cordova platform add android
        cp -R ../index.html www/index.html
        
    - name: Configure Storage Permissions & Android Capabilities
      run: |
        cd outputapp
        sed -i '/<\/widget>/i \    <config-file target="AndroidManifest.xml" parent="/*" xmlns:android="http://schemas.android.com/apk/res/android">\n        <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>\n        <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" \/>\n    <\/config-file>' config.xml

    - name: Generate High-Visibility App Icon & Splash Screen Asset
      run: |
        cd outputapp
        mkdir -p res/icon/android
        mkdir -p res/screen/android
        # Python builds a professional 512x512 gradient with white keyhole emblem vector geometry
        python3 -c "
        import struct, zlib, math
        def make_png():
            w, h = 512, 512
            img_data = bytearray()
            for y in range(h):
                img_data.append(0)
                for x in range(w):
                    dx, dy = x - 256, y - 256
                    dist = math.sqrt(dx*dx + dy*dy)
                    
                    r = max(10, int(25 - (dist * 0.02)))
                    g = max(12, int(15 - (dist * 0.01)))
                    b = max(35, int(55 - (dist * 0.05)))
                    
                    in_keyhole = False
                    if math.sqrt(dx*dx + (dy + 30)*(dy + 30)) < 45:
                        in_keyhole = True
                    elif dy >= -10 and dy <= 80:
                        w_at_y = 20 + (dy - (-10)) * 0.45
                        if abs(dx) < w_at_y:
                            in_keyhole = True
                            
                    if in_keyhole:
                        r, g, b = 245, 245, 250
                        
                    img_data.extend([r, g, b])
            
            chunks = [
                b'\x89PNG\r\n\x1a\n',
                b'IHDR' + struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0),
                b'IDAT' + zlib.compress(img_data),
                b'IEND'
            ]
            return b''.join([c if i==0 else struct.pack('>I', len(c)-4) + c + struct.pack('>I', zlib.crc32(c)) for i, c in enumerate(chunks)])
            
        img_bytes = make_png()
        with open('res/icon/android/icon.png', 'wb') as f:
            f.write(img_bytes)
        with open('res/screen/android/screen.png', 'wb') as f:
            f.write(img_bytes)
        "
        # Sync the generated imagery into the Cordova packaging trees
        sed -i '/<\/widget>/i \    <platform name="android">\n        <icon src="res/icon/android/icon.png" \/>\n        <splash src="res/screen/android/screen.png" \/>\n    </platform>' config.xml

    - name: Compile Android Debug APK
      run: |
        cd outputapp
        cordova build android

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Magic-Lock-Application
        path: outputapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
