<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">

    <title>Magic Trick App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            transform: translate3d(0,0,0);
        }

        html, body {
            width: 100% !important;
            height: 100% !important;
            min-height: 100% !important;
            overflow: hidden !important;
            position: fixed !important;
            top: 0; left: 0;
            background-color: #000000;
            color: #ffffff;
        }

        /* View Layouts */
        .view-panel {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            overflow-y: auto;
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top));
        }

        .view-panel.active {
            display: block;
        }

        /* Simple styling for configuration controls */
        .config-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #aaaaaa;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: #121212;
            border: 1px solid #333333;
            color: #ffffff;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Minimal styling for Lock Screen UI placeholder */
        #lock-screen-view {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: #000000;
        }

        .lock-status {
            font-size: 18px;
            margin-bottom: 30px;
            color: #888888;
        }
    </style>
</head>
<body>

    <div id="lock-screen-view" class="view-panel active">
        <div style="margin: auto;">
            <div class="lock-status">Device Locked</div>
            <p style="color: #444; font-size: 12px;">Tap target area to trigger secret workflows</p>
            <button onclick="switchView('config-screen')" style="background: #222; color: #fff; width: auto; padding: 10px 20px; font-size: 14px;">Open Settings</button>
        </div>
    </div>

    <div id="config-screen" class="view-panel">
        <h2>Configuration Panel</h2>
        <p style="color: #666; margin-bottom: 20px; font-size: 14px;">Adjust system triggers and state behaviors</p>

        <div class="config-group">
            <label for="effect-mode-select">Active Effect Mode</label>
            <select id="effect-mode-select">
                <option value="1">Mode 1: Instant Reset</option>
                <option value="2">Mode 2: Persistent State</option>
            </select>
        </div>

        <div class="config-group">
            <label for="unlock-attempt-input">Universal Unlock Code</label>
            <input type="text" id="unlock-attempt-input" value="0000">
        </div>

        <div class="config-group">
            <label for="capture-attempts-config">Capture Configuration</label>
            <input type="text" id="capture-attempts-config" value="default_raw">
        </div>

        <div class="config-group">
            <label for="factor-year-input">Performance Factor (Year)</label>
            <input type="number" id="factor-year-input" value="2026">
        </div>

        <div class="config-group">
            <label for="factor-date-num-input">Performance Factor (Date Number)</label>
            <input type="number" id="factor-date-num-input" value="1">
        </div>

        <div class="config-group">
            <label for="peek-hold-input">Peek Hold Time (Seconds)</label>
            <input type="number" id="peek-hold-input" value="3">
        </div>

        <div class="config-group">
            <label for="api-sync-select">API Synchronization</label>
            <select id="api-sync-select">
                <option value="false">Disabled</option>
                <option value="true">Enabled</option>
            </select>
        </div>

        <div class="config-group">
            <label for="api-url-input">API Endpoint URL</label>
            <input type="text" id="api-url-input" value="https://api.example.com/sync">
        </div>

        <div class="config-group">
            <label for="new-pin-input">Update Target PIN (Leave blank to keep current)</label>
            <input type="password" id="new-pin-input" placeholder="Enter 4-6 digit PIN" pattern="\d*">
        </div>

        <button onclick="saveConfiguration()">Save & Activate Configuration</button>
    </div>

    <script>
        // Global State Defaults
        let targetPin = localStorage.getItem("app_pin") || "1234";
        let runAttemptCounter = 0;
        let capturedAttemptsObject = {};

        // Navigation Engine
        function switchView(viewId) {
            document.querySelectorAll('.view-panel').forEach(panel => {
                panel.classList.remove('active');
            });
            const targetPanel = document.getElementById(viewId + "-view") || document.getElementById(viewId);
            if(targetPanel) {
                targetPanel.classList.add('active');
                targetPanel.scrollTop = 0;
            }
        }

        // Placeholder fallback helper for presentation popups
        function formatDisplayPeekPopup() {
            console.log("Peek popup buffer updated and refreshed.");
        }

        // Configuration Control Form Submission Engine
        function saveConfiguration() {
            // Safe fallback value gathering
            const activeEffectMode = document.getElementById("effect-mode-select") ? document.getElementById("effect-mode-select").value : "1";
            const universalUnlockAttempt = document.getElementById("unlock-attempt-input") ? document.getElementById("unlock-attempt-input").value.trim() : "";
            const rawCaptureConfig = document.getElementById("capture-attempts-config") ? document.getElementById("capture-attempts-config").value.trim() : "";
            const factorYear = document.getElementById("factor-year-input") ? document.getElementById("factor-year-input").value : "2026";
            const factorDateNum = document.getElementById("factor-date-num-input") ? document.getElementById("factor-date-num-input").value : "1";
            const peekHoldSecs = document.getElementById("peek-hold-input") ? document.getElementById("peek-hold-input").value : "3";
            const apiSyncEnabled = document.getElementById("api-sync-select") ? document.getElementById("api-sync-select").value : "false";
            const apiUrlEndpoint = document.getElementById("api-url-input") ? document.getElementById("api-url-input").value.trim() : "";

            // Write updates seamlessly to client local caching tier
            localStorage.setItem("app_active_effect_mode", activeEffectMode);
            localStorage.setItem("app_universal_unlock_attempt", universalUnlockAttempt);
            localStorage.setItem("app_perf_capture_attempts", rawCaptureConfig);
            localStorage.setItem("app_perf_year", factorYear);
            localStorage.setItem("app_perf_date_num", factorDateNum);
            localStorage.setItem("app_peek_hold_time", peekHoldSecs);
            
            localStorage.setItem("app_api_sync_enabled", apiSyncEnabled);
            localStorage.setItem("app_api_url_endpoint", apiUrlEndpoint);

            if (activeEffectMode === "1") {
                capturedAttemptsObject = {};
                localStorage.removeItem("app_captured_attempts_obj");
            }

            // CRITICAL FIX: Safely check if 'newPinInput' exists before trying to read its value properties
            const newPinInput = document.getElementById("new-pin-input");
            
            if (newPinInput) {
                const val = newPinInput.value.trim();
                if (val !== "") {
                    if(val.length >= 4 && val.length <= 6 && /^\d+$/.test(val)) {
                        targetPin = val;
                        localStorage.setItem("app_pin", val);
                        newPinInput.value = "";
                    } else {
                        alert("Error: PIN code must be between 4 and 6 digits.");
                        return; // Halt routine execution if explicit user entry criteria fails
                    }
                }
            } else {
                // If the element doesn't exist, safely log it without crashing the engine execution loop
                console.warn("Notice: 'newPinInput' element was missing during save routine. Core fallback logic preserved.");
            }

            formatDisplayPeekPopup();
            alert("Configuration Active!");
            runAttemptCounter = 0; 
            switchView("lock-screen");
        }
    </script>
</body>
</html>
